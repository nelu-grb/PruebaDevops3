name: CI/CD Pipeline - DevOps EP3

on:
  push:
    branches: [ "main" ] # Se ejecuta automáticamente tras cada commit o merge a main

env:
  AWS_REGION: us-east-1                  # Región por defecto de AWS Academy
  EKS_CLUSTER_NAME: mi-cluster-eks       # El nombre que le des a tu clúster EKS
  ECR_FRONTEND_REPO: repo-frontend       # Nombre de tu repositorio ECR para el Front
  ECR_BACKEND_REPO: repo-backend         # Nombre de tu repositorio ECR para el Back

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Clonar el código del repositorio de GitHub
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Configurar las credenciales de AWS Academy (Dinámicas)
    # NOTA: Debes guardar estas tres variables en los "Secrets" de tu repositorio de GitHub
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} # Obligatorio para AWS Academy
        aws-region: ${{ env.AWS_REGION }}

    # 3. Autenticarse en Amazon ECR (Elastic Container Registry)
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4. Construir las imágenes Docker, etiquetarlas y subirlas (Push) a Amazon ECR
    - name: Build, Tag, and Push Images to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }} # Usa el hash del commit como etiqueta única
      run: |
        # ---- BACKEND ----
        docker build -t $ECR_REGISTRY/${{ env.ECR_BACKEND_REPO }}:$IMAGE_TAG ./backend
        docker push $ECR_REGISTRY/${{ env.ECR_BACKEND_REPO }}:$IMAGE_TAG
        
        # ---- FRONTEND ----
        docker build -t $ECR_REGISTRY/${{ env.ECR_FRONTEND_REPO }}:$IMAGE_TAG ./frontend
        docker push $ECR_REGISTRY/${{ env.ECR_FRONTEND_REPO }}:$IMAGE_TAG
        
        # Guardar el tag para el siguiente paso de despliegue
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
        echo "ECR_REGISTRY=$ECR_REGISTRY" >> $GITHUB_ENV

    # 5. Configurar el archivo kubeconfig para conectarse a AWS EKS
    - name: Update Kubeconfig for EKS
      run: |
        aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

    # 6. Desplegar de forma actualizada en Kubernetes (EKS) aplicando los manifiestos
    - name: Deploy to AWS EKS
      run: |
        # 1. Crear el namespace si no existe (opcional si ya está en tu namespace.yaml)
        kubectl apply -f k8s/namespace.yaml
        
        # 2. Aplicar los secretos primero
        kubectl apply -f k8s/mysql-secret.yaml
        
        # 3. Aplicar base de datos y servicios de red
        kubectl apply -f k8s/mysql-deployment.yaml
        kubectl apply -f k8s/mysql-service.yaml
        kubectl apply -f k8s/backend-service.yaml
        kubectl apply -f k8s/frontend-service.yaml
        
        # 4. Inyectar dinámicamente las imágenes recién compiladas desde ECR a los manifiestos de despliegue
        cat k8s/backend-deployment.yaml | sed "s|image:.*|image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_BACKEND_REPO }}:${{ env.IMAGE_TAG }}|g" | kubectl apply -f -
        cat k8s/frontend-deployment.yaml | sed "s|image:.*|image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_FRONTEND_REPO }}:${{ env.IMAGE_TAG }}|g" | kubectl apply -f -
        
        # 5. Aplicar políticas de Autoscaling (HPA)
        kubectl apply -f k8s/backend-hpa.yaml
        kubectl apply -f k8s/frontend-hpa.yaml

    # 7. Verificar el estado del despliegue (Crítico para la sección de métricas/logs)
    - name: Verify Deployment Status
      run: |
        kubectl rollout status deployment/backend-deployment -n <tu-namespace>
        kubectl rollout status deployment/frontend-deployment -n <tu-namespace>
        kubectl get pods -n <tu-namespace>